<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UFC Fighter Comparator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<header>
  <div class="logo">UFC <em>FIGHTER</em> COMPARATOR</div>
  <div class="sub">Análise estatística · Comparação lado a lado</div>
</header>

<main>
  <section class="search-section">
    <div class="notice">
      <strong>Versão 1 para GitHub Pages.</strong> Base ampliada, fotos com fallback e histórico separado em JSON. Perfis marcados como “básico” precisam de revisão manual antes de serem considerados completos.
    </div>
    <div class="toolbar">
      <label>
        Divisão
        <select id="divisionFilter">
          <option value="">Todas as divisões</option>
        </select>
      </label>
      <button class="ghost" id="randomBtn" type="button">Comparação aleatória</button>
    </div>
    <div class="sg">
      <div class="sbox">
        <label class="slbl">🔴 Lutador 1</label>
        <input class="sinp" id="i1" placeholder="Ex: Jon Jones, Topuria, Poatan..." autocomplete="off"/>
        <div class="sug" id="s1"></div>
      </div>
      <div class="vs-mid"><span>VS</span></div>
      <div class="sbox">
        <label class="slbl">🔵 Lutador 2</label>
        <input class="sinp" id="i2" placeholder="Ex: Makhachev, Oliveira, O'Malley..." autocomplete="off"/>
        <div class="sug" id="s2"></div>
      </div>
    </div>
    <button class="cbtn" id="cbtn" type="button" disabled>COMPARAR LUTADORES</button>
    <div class="counter" id="counter">Carregando base...</div>
  </section>
  <section id="result"></section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
