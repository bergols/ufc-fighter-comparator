<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UFC Fighter Comparator</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root{--red:#D20A0A;--red-glow:rgba(210,10,10,0.3);--gold:#C9A84C;--bg:#080808;--surface:#111;--surface2:#191919;--border:rgba(255,255,255,0.07);--text:#EEE;--muted:rgba(255,255,255,0.4);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 35% at 15% 50%,rgba(210,10,10,0.07),transparent 70%),radial-gradient(ellipse 50% 35% at 85% 50%,rgba(210,10,10,0.07),transparent 70%);pointer-events:none;z-index:0;}
    header{position:relative;z-index:10;text-align:center;padding:52px 20px 28px;border-bottom:1px solid var(--border);}
    .logo{font-family:'Oswald',sans-serif;font-size:clamp(1.8rem,5vw,3.5rem);font-weight:700;letter-spacing:6px;color:#fff;text-transform:uppercase;}
    .logo em{color:var(--red);font-style:normal;}
    .sub{font-size:.72rem;letter-spacing:5px;color:var(--muted);text-transform:uppercase;margin-top:8px;}
    .search-section{position:relative;z-index:10;max-width:860px;margin:36px auto 0;padding:0 24px;}
    .sg{display:grid;grid-template-columns:1fr 80px 1fr;gap:0;align-items:start;}
    .sbox{position:relative;}
    .slbl{font-family:'Oswald',sans-serif;font-size:.68rem;letter-spacing:4px;color:var(--red);text-transform:uppercase;margin-bottom:8px;display:block;}
    .sinp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s,box-shadow .2s;}
    .sinp:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow);}
    .sinp::placeholder{color:var(--muted);}
    .sug{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:6px;z-index:100;display:none;max-height:280px;overflow-y:auto;}
    .sug.open{display:block;}
    .si{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:10px;transition:background .15s;}
    .si:last-child{border-bottom:none;}
    .si:hover{background:rgba(210,10,10,0.1);}
    .si-photo{width:38px;height:38px;border-radius:50%;object-fit:cover;object-position:top;background:#222;flex-shrink:0;border:1px solid rgba(255,255,255,0.1);}
    .si-name{font-size:.85rem;font-weight:600;}
    .si-nick{color:var(--gold);font-style:italic;}
    .si-div{font-size:.68rem;color:var(--muted);margin-top:2px;}
    .vs-mid{display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px;}
    .vs-mid span{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;color:var(--red);letter-spacing:3px;}
    .cbtn{display:block;width:100%;margin-top:16px;padding:15px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:opacity .2s,box-shadow .2s;}
    .cbtn:hover:not(:disabled){opacity:.88;box-shadow:0 0 20px var(--red-glow);}
    .cbtn:disabled{background:#2a2a2a;color:#555;cursor:not-allowed;}
    #result{position:relative;z-index:10;max-width:1060px;margin:0 auto;padding:0 24px 80px;display:none;}
    #result.show{display:block;}
    .fighters-row{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;margin:32px 0 28px;align-items:start;}
    .fc{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .fc.rc{border-top:3px solid var(--red);}
    .fc.bc{border-top:3px solid #1a6bbf;}
    .clbl{padding:8px 16px;font-family:'Oswald',sans-serif;font-size:.62rem;letter-spacing:4px;text-transform:uppercase;}
    .rc .clbl{background:rgba(210,10,10,0.12);color:var(--red);}
    .bc .clbl{background:rgba(26,107,191,0.12);color:#5b9edd;}
    .photo-wrap{position:relative;width:100%;aspect-ratio:4/3;background:linear-gradient(180deg,#1a1a1a,#111);overflow:hidden;}
    .photo-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,var(--surface),transparent);z-index:1;}
    .fighter-img{width:100%;height:100%;object-fit:cover;object-position:top center;filter:grayscale(10%) contrast(1.05);}
    .no-photo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem;opacity:.08;}
    .champ-badge{position:absolute;top:10px;right:10px;z-index:2;background:var(--gold);color:#000;font-family:'Oswald',sans-serif;font-size:.58rem;letter-spacing:2px;padding:4px 8px;border-radius:4px;font-weight:700;}
    .finfo{padding:16px;}
    .fname{font-family:'Oswald',sans-serif;font-size:clamp(1rem,2.5vw,1.6rem);font-weight:700;letter-spacing:2px;text-transform:uppercase;line-height:1.1;}
    .fnick{font-size:.78rem;color:var(--gold);font-style:italic;margin-top:4px;}
    .fdiv{font-family:'Oswald',sans-serif;font-size:.66rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:8px;}
    .rec{display:flex;align-items:baseline;gap:3px;margin-top:12px;}
    .rn{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;line-height:1;}
    .rn.w{color:#4ade80;}.rn.l{color:#f87171;}.rn.d{color:var(--muted);}
    .rs{font-family:'Oswald',sans-serif;font-size:1.3rem;color:var(--muted);padding:0 2px;}
    .rlbl{font-size:.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
    .phys{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
    .pv{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:500;}
    .pl{font-size:.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
    .fins{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
    .fb{text-align:center;background:var(--surface2);border-radius:6px;padding:9px 4px;}
    .fv{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:600;}
    .fv.ko{color:var(--red);}.fv.sub{color:#a78bfa;}.fv.dec{color:var(--gold);}
    .fl{font-size:.57rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
    .vs-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:80px;gap:10px;}
    .vs-big{font-family:'Oswald',sans-serif;font-size:2.6rem;font-weight:700;color:var(--red);letter-spacing:4px;text-shadow:0 0 25px var(--red-glow);}
    .vline{width:1px;height:180px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.08),transparent);}
    .stitle{font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:5px;color:var(--muted);text-transform:uppercase;text-align:center;margin:24px 0 14px;display:flex;align-items:center;gap:14px;}
    .stitle::before,.stitle::after{content:'';flex:1;height:1px;background:var(--border);}
    .radar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:36px;flex-wrap:wrap;}
    .rlegend{display:flex;flex-direction:column;gap:10px;}
    .rli{display:flex;align-items:center;gap:8px;font-size:.82rem;}
    .rldot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
    .rnote{margin-top:14px;font-size:.7rem;color:var(--muted);line-height:1.9;}
    .sbars{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:20px;}
    .srow{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:14px;}
    .srow:last-child{margin-bottom:0;}
    .bwrap{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
    .bf{height:100%;border-radius:3px;}
    .bf.r{background:var(--red);}.bf.b{background:#1a6bbf;}
    .blft{text-align:right;}.brgt{text-align:left;}
    .bv{font-family:'Oswald',sans-serif;font-size:.95rem;font-weight:500;}
    .bv.r{color:var(--red);}.bv.b{color:#5b9edd;}
    .blbl{font-size:.6rem;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;text-align:center;white-space:nowrap;}
    .hgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
    .hcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .hhdr{padding:10px 14px;font-family:'Oswald',sans-serif;font-size:.66rem;letter-spacing:3px;text-transform:uppercase;border-bottom:1px solid var(--border);}
    .frow{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,0.04);}
    .frow:last-child{border-bottom:none;}
    .fres{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:.72rem;font-weight:700;flex-shrink:0;}
    .fres.W{background:rgba(74,222,128,.14);color:#4ade80;}
    .fres.L{background:rgba(248,113,113,.14);color:#f87171;}
    .fres.D{background:rgba(255,255,255,.07);color:var(--muted);}
    .fopp{font-size:.82rem;font-weight:500;flex:1;}
    .fmeth{font-size:.67rem;color:var(--muted);}
    .fev{font-size:.65rem;color:var(--muted);text-align:right;white-space:nowrap;}
    .err{text-align:center;padding:32px;color:var(--muted);font-size:.9rem;}
    .counter{text-align:center;font-size:.7rem;letter-spacing:3px;color:var(--muted);margin-top:10px;text-transform:uppercase;}
    @media(max-width:700px){.sg,.fighters-row,.hgrid{grid-template-columns:1fr;}.vs-mid,.vs-col{display:none;}.radar-wrap{flex-direction:column;}}
  </style>
</head>

  <div class="counter" id="counter"></div>
</div>
<div id="result"></div>

// Remove duplicate entry
const FIGHTERS = DB.filter((f,i,a)=>a.findIndex(x=>x.name===f.name)===i);

let chartInst=null;

document.getElementById('counter').textContent = FIGHTERS.length + ' lutadores disponíveis';

function search(q){
  const lq=q.toLowerCase().trim();
  if(!lq) return [];
  return FIGHTERS.filter(f=>
    f.name.toLowerCase().includes(lq)||
    (f.nick&&f.nick.toLowerCase().includes(lq))||
    f.div.toLowerCase().includes(lq)||
    f.country.toLowerCase().includes(lq)
  ).slice(0,7);
}

function setup(n){
  const inp=document.getElementById('i'+n);
  const box=document.getElementById('s'+n);
  inp.addEventListener('input',()=>{
    updateBtn();
    const res=search(inp.value);
    if(!res.length){box.classList.remove('open');return;}
    box.innerHTML='';
    res.forEach(f=>{
      const d=document.createElement('div');
      d.className='si';
      d.innerHTML=`<img class="si-photo" src="${f.photo}" alt="${f.name}" onerror="this.style.opacity=0"/>
        <div><div class="si-name">${f.name}${f.nick?` <span class="si-nick">"${f.nick}"</span>`:''}</div>
        <div class="si-div">${f.div} · ${f.country}</div></div>`;
      d.addEventListener('mousedown',()=>{
        inp.value=f.name; inp.dataset.idx=FIGHTERS.indexOf(f);
        box.classList.remove('open'); updateBtn();
      });
      box.appendChild(d);
    });
    box.classList.add('open');
  });
  inp.addEventListener('blur',()=>setTimeout(()=>box.classList.remove('open'),180));
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){box.classList.remove('open');if(!document.getElementById('cbtn').disabled)compare();}
    if(e.key==='Escape')box.classList.remove('open');
  });
}

function updateBtn(){
  document.getElementById('cbtn').disabled=
    !document.getElementById('i1').value.trim()||
    !document.getElementById('i2').value.trim();
}

function getF(n){
  const inp=document.getElementById('i'+n);
  const idx=parseInt(inp.dataset.idx);
  if(!isNaN(idx)&&FIGHTERS[idx]) return FIGHTERS[idx];
  const q=inp.value.trim().toLowerCase();
  return FIGHTERS.find(f=>f.name.toLowerCase().includes(q))||null;
}

function compare(){
  const f1=getF(1),f2=getF(2);
  const el=document.getElementById('result');
  if(!f1||!f2){
    el.style.display='block';
    el.innerHTML='<div class="err">Lutador não encontrado. Use as sugestões da lista.</div>';
    return;
  }
  el.style.display='block';
  render(f1,f2);
  setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function card(f,cls,label){
  const r=f.record,fi=f.fin;
  return `<div class="fc ${cls}">
    <div class="clbl">${label}</div>
    <div class="photo-wrap">
      ${f.champ?'<div class="champ-badge">👑 CAMPEÃO</div>':''}
      <img class="fighter-img" src="${f.photo}" alt="${f.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="no-photo" style="display:none">🥊</div>
    </div>
    <div class="finfo">
      <div class="fname">${f.name}</div>
      ${f.nick?`<div class="fnick">"${f.nick}"</div>`:''}
      <div class="fdiv">${f.div}</div>
      ${f.title?`<div style="font-size:.63rem;color:var(--gold);margin-top:4px">${f.title}</div>`:''}
      <div class="rec">
        <span class="rn w">${r.w}</span><span class="rs">-</span>
        <span class="rn l">${r.l}</span><span class="rs">-</span>
        <span class="rn d">${r.d}</span>
      </div>
      <div class="rlbl">Vitórias · Derrotas · Empates</div>
      <div class="phys">
        <div><div class="pv">${f.height}</div><div class="pl">Altura</div></div>
        <div><div class="pv">${f.reach}</div><div class="pl">Alcance</div></div>
        <div><div class="pv">${f.age}</div><div class="pl">Idade</div></div>
        <div><div class="pv">${f.stance}</div><div class="pl">Stance</div></div>
        <div style="grid-column:span 2"><div class="pv" style="font-size:.82rem">${f.team}</div><div class="pl">Team</div></div>
      </div>
      <div class="fins">
        <div class="fb"><div class="fv ko">${fi.ko}</div><div class="fl">KO/TKO</div></div>
        <div class="fb"><div class="fv sub">${fi.sub}</div><div class="fl">Sub</div></div>
        <div class="fb"><div class="fv dec">${fi.dec}</div><div class="fl">Dec</div></div>
      </div>
    </div>
  </div>`;
}

function bar(f1,f2,key,label,hi){
  const v1=f1.stats[key]??0,v2=f2.stats[key]??0;
  const mx=Math.max(v1,v2,0.001);
  const p1=(v1/mx)*100,p2=(v2/mx)*100;
  const fmt=n=>Number.isInteger(n)?n:n.toFixed(2);
  const b1=hi?v1>v2:v1<v2,b2=hi?v2>v1:v2<v1;
  return `<div class="srow">
    <div class="blft"><div class="bv r" style="${b1?'font-weight:700':''}">${fmt(v1)}</div>
      <div class="bwrap" style="margin-top:3px"><div class="bf r" style="width:${p1}%;margin-left:auto"></div></div></div>
    <div class="blbl">${label}</div>
    <div class="brgt"><div class="bv b" style="${b2?'font-weight:700':''}">${fmt(v2)}</div>
      <div class="bwrap" style="margin-top:3px"><div class="bf b" style="width:${p2}%"></div></div></div>
  </div>`;
}

function hist(f,accent){
  return `<div class="hcard">
    <div class="hhdr" style="color:${accent}">${f.name} · Últimas Lutas</div>
    ${f.fights.map(g=>`
      <div class="frow">
        <div class="fres ${g.r}">${g.r}</div>
        <div style="flex:1"><div class="fopp">${g.opp}</div>
        <div class="fmeth">${g.meth} · R${g.rnd} ${g.t}</div></div>
        <div class="fev">${g.ev}</div>
      </div>`).join('')}
  </div>`;
}

function render(f1,f2){
  const el=document.getElementById('result');
  if(chartInst){chartInst.destroy();chartInst=null;}
  el.innerHTML=
    `<div class="fighters-row">
      ${card(f1,'rc','🔴 Esquina Vermelha')}
      <div class="vs-col"><div class="vs-big">VS</div><div class="vline"></div></div>
      ${card(f2,'bc','🔵 Esquina Azul')}
    </div>`+
    `<div class="stitle">COMPARAÇÃO ESTATÍSTICA</div>
    <div class="radar-wrap">
      <canvas id="rc" width="320" height="320" style="max-width:320px;max-height:320px"></canvas>
      <div class="rlegend">
        <div class="rli"><div class="rldot" style="background:rgba(210,10,10,.85)"></div><strong style="color:var(--red)">${f1.name}</strong></div>
        <div class="rli"><div class="rldot" style="background:rgba(91,158,221,.85)"></div><strong style="color:#5b9edd">${f2.name}</strong></div>
        <div class="rnote">SLpM = Strikes/Min<br>SA = Precisão<br>SD = Defesa<br>TD = Takedowns<br>TDD = Defesa TD<br>SUB = Submissões</div>
      </div>
    </div>`+
    `<div class="stitle">ESTATÍSTICAS DETALHADAS</div>
    <div class="sbars">
      ${bar(f1,f2,'slpm','Strikes / Min',true)}
      ${bar(f1,f2,'sacc','Precisão Strikes (%)',true)}
      ${bar(f1,f2,'sdef','Defesa Strikes (%)',true)}
      ${bar(f1,f2,'tdavg','Takedowns / 15 Min',true)}
      ${bar(f1,f2,'tdacc','Precisão Takedown (%)',true)}
      ${bar(f1,f2,'tddef','Defesa Takedown (%)',true)}
      ${bar(f1,f2,'subavg','Tentativas Sub / 15 Min',true)}
      ${bar(f1,f2,'kdavg','Knockdowns / 15 Min',true)}
    </div>`+
    `<div class="stitle">HISTÓRICO DE LUTAS</div>
    <div class="hgrid">${hist(f1,'var(--red)')}${hist(f2,'#5b9edd')}</div>`;

  requestAnimationFrame(()=>{
    const ctx=document.getElementById('rc')?.getContext('2d');
    if(!ctx) return;
    const s1=f1.stats,s2=f2.stats;
    const nm=(v,mx)=>Math.min(100,Math.round((v||0)/mx*100));
    const keys=['slpm','sacc','sdef','tdavg','tddef','subavg'];
    const mxs=[10,100,100,8,100,4];
